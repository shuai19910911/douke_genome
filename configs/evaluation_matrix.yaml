schema_version: "3.0-candidate"
contract_status: proposed_cold_genus_and_specialist_tasks_not_frozen
formal_contexts: [1024, 8192, 32768, 65536, 131072, 262144]
pretraining_cold_genera: [Arachis, Phaseolus, Vicia]
cold_genus_roles:
  development: [Phaseolus]
  sealed_test: [Arachis, Vicia]
cold_genus_status: proposed_from_74_source_capacity_audit_not_yet_in_schema2_release
common_leakage_groups:
  - orientation_group_id
  - near_duplicate_group_id
  - material_key
  - chromosome_homology_component
required_reporting:
  - in_distribution
  - leave_one_species_out
  - cold_genus
  - low_homology
  - frozen_encoder
  - full_finetune
baseline_suite:
  internal:
    - random_init_same_architecture
    - single_species_pretraining_same_budget
    - no_reverse_complement_symmetrization
    - single_context_8192_same_token_budget
    - unbalanced_species_sampling
  external:
    - GPN
    - AgroNT_1B
    - PlantCAD2_Small_88M
    - PlantCAD2_Medium_311M
    - PlantCAD2_Large_694M
    - Nucleotide_Transformer_v2_500M_multi_species
    - Evo2_7B
    - Evo2_40B_if_h20_runtime_gate_passes
    - PlantCaduceus
    - Caduceus
    - HyenaDNA
    - PlantGFM_if_public_weights_and_license_verified
  task_specific:
    - one_hot_CNN
    - gradient_boosted_kmer_features
    - established_bioinformatics_tool
selection_rule: validation_only; formal test labels remain sealed until model and hyperparameters are frozen
tasks:
  - id: splice_donor
    category: base
    core: true
    availability: buildable_from_frozen_annotation
    unit: candidate dinucleotide with 512-bp context
    labels: GFF exon-intron donor boundaries
    split: cold_genus plus gene-family homology component
    metrics: [auPRC, auROC, MCC]
  - id: splice_acceptor
    category: base
    core: true
    availability: buildable_from_frozen_annotation
    unit: candidate dinucleotide with 512-bp context
    labels: GFF intron-exon acceptor boundaries
    split: cold_genus plus gene-family homology component
    metrics: [auPRC, auROC, MCC]
  - id: translation_start
    category: base
    core: true
    availability: buildable_from_frozen_annotation
    unit: candidate ATG with 1024-bp context
    labels: primary-CDS starts from paired genome/GFF
    split: cold_genus plus gene-family homology component
    metrics: [auPRC, MCC]
  - id: translation_stop
    category: base
    core: true
    availability: buildable_from_frozen_annotation
    unit: candidate stop codon with 1024-bp context
    labels: primary-CDS stops from paired genome/GFF
    split: cold_genus plus gene-family homology component
    metrics: [auPRC, MCC]
  - id: promoter_tss
    category: region
    core: true
    availability: buildable_from_frozen_annotation
    unit: 2048-bp region
    labels: annotated gene 5-prime boundaries; proxy label explicitly reported
    split: cold_genus plus gene-family homology component
    metrics: [auPRC, auROC]
  - id: gene_body_segmentation
    category: region
    core: true
    availability: buildable_from_frozen_annotation
    unit: 16384-bp sequence with per-base states
    labels: intergenic, UTR, CDS and intron states from GFF
    split: chromosome-level cold-genus folds
    metrics: [macro_F1, boundary_F1, segment_IoU]
  - id: exon_intron_boundary
    category: region
    core: true
    availability: buildable_from_frozen_annotation
    unit: 4096-bp sequence
    labels: exon and intron intervals from GFF
    split: gene-family homology component
    metrics: [macro_F1, boundary_F1]
  - id: coding_frame
    category: gene
    core: true
    availability: buildable_from_frozen_annotation
    unit: annotated CDS candidate
    labels: GFF phase-consistent primary CDS
    split: cold_genus plus protein-homology component
    metrics: [accuracy, macro_F1]
  - id: ortholog_retrieval
    category: gene
    core: true
    availability: buildable_from_frozen_genome_annotation_protein
    unit: full gene locus embedding
    labels: orthogroups rebuilt from paired primary proteins
    split: query genus excluded from gallery training
    metrics: [recall_at_1, recall_at_10, MRR]
  - id: low_homology_gene_function
    category: gene
    core: true
    availability: pending_official_GO_mapping
    unit: full gene locus
    labels: curator-backed GO terms; electronically inferred labels excluded from formal test
    split: protein identity below 30 percent across train-test
    metrics: [macro_auPRC, micro_auPRC, Fmax]
  - id: zero_shot_variant_constraint
    category: variant
    core: true
    availability: pending_official_population_variants
    unit: reference and alternate allele window
    labels: allele-frequency matched constrained versus common variants
    split: cold chromosome and cold genus; no model selection on test variants
    metrics: [auROC, auPRC, Spearman]
  - id: deleterious_variant_priority
    category: variant
    core: true
    availability: pending_curated_functional_variants
    unit: reference and alternate allele window
    labels: experimentally supported deleterious versus frequency-matched neutral variants
    split: gene-family and material grouped
    metrics: [auPRC, auROC, NDCG]
  - id: chromatin_accessibility
    category: regulatory
    core: false
    availability: pending_official_ATAC_DNase_tracks
    unit: 2048-bp region
    labels: tissue-specific ATAC-seq or DNase peaks
    split: chromosome nested within accession and tissue
    metrics: [auPRC, auROC]
  - id: transcription_factor_binding
    category: regulatory
    core: false
    availability: pending_curated_DAP_ChIP_tracks
    unit: 1024-bp region
    labels: TF-specific DAP-seq or ChIP-seq peaks
    split: chromosome and motif-family grouped
    metrics: [auPRC, auROC]
  - id: gene_expression
    category: regulatory
    core: false
    availability: pending_official_expression_atlas
    unit: promoter plus gene locus
    labels: log-transformed tissue expression with accession covariates
    split: cold accession and cold tissue; no replicate leakage
    metrics: [Pearson, Spearman, R2]
  - id: eqtl_prioritization
    category: variant
    core: false
    availability: pending_official_eQTL_summary_statistics
    unit: variant-gene pair
    labels: fine-mapped cis-eQTL credible sets
    split: chromosome and LD block grouped
    metrics: [auPRC, NDCG, recall_at_10]
  - id: genomic_prediction
    category: breeding
    core: false
    availability: pending_genotype_phenotype_cohort
    unit: accession genotype plus frozen sequence embeddings
    labels: multi-environment quantitative traits
    split: nested family or population-group CV with final sealed cohort
    metrics: [Pearson, R2, normalized_RMSE]
  - id: allele_specific_expression
    category: breeding
    core: false
    availability: pending_phased_RNA_seq
    unit: heterozygous regulatory variant
    labels: replicate-aware allelic imbalance
    split: material and gene-family grouped
    metrics: [auPRC, Pearson]
  - id: distal_promoter_gene_link
    category: long_context
    core: false
    availability: pending_3D_or_perturbation_labels
    unit: promoter-candidate region pair up to 262144 bp
    labels: experimentally supported links only
    split: chromosome and gene-family grouped
    metrics: [auPRC, recall_at_10]
  - id: synteny_break_classification
    category: comparative
    core: false
    availability: buildable_after_frozen_pairwise_synteny
    unit: homologous genomic block pair
    labels: conserved versus rearranged blocks
    split: complete species-pair holdout
    metrics: [macro_F1, auPRC]
  - id: cold_giant_gene_reconstruction
    category: long_context
    core: true
    availability: buildable_after_cross_source_gff_normalization
    unit: complete gene locus with nested 8192-to-262144-bp contexts
    labels: normalized CDS intron UTR and intergenic segmentation
    split: Phaseolus cold development; Arachis and Vicia sealed test; orthogroup grouped
    metrics: [macro_F1, boundary_F1, exact_transcript_match]
  - id: soybean_nodule_cell_program
    category: legume_specialist
    core: true
    availability: public_source_verified_GSE226149_not_built
    unit: soybean gene with promoter and complete locus context
    labels: root infection non_fixing fixing senescing or shared program
    split: chromosome and orthogroup grouped
    metrics: [macro_auPRC, hierarchical_F1, macro_F1]
  - id: symbiosis_gene_function_retrieval
    category: legume_specialist
    core: true
    availability: curated_function_set_required
    unit: full gene plus flanking sequence
    labels: nod_factor_perception signalling infection organogenesis autoregulation fixation
    split: leave_one_genus_out and orthogroup grouped
    metrics: [MRR, recall_at_5, hierarchical_F1]
  - id: rhg1_rhg4_scn_resistance
    category: legume_specialist
    core: true
    availability: phenotype_source_verified_sequence_linkage_pending
    unit: Rhg1 long repeat locus plus Rhg4 locus per accession
    labels: copy_haplotype female_index and ordinal resistance by HG type
    split: accession lineage and breeding family grouped
    metrics: [Spearman, ordinal_macro_F1, macro_auPRC]
  - id: soybean_flowering_geographic_adaptation
    category: legume_specialist
    core: true
    availability: public_915_and_17019_accession_sources_verified_not_built
    unit: local and multi-locus haplotypes plus explicit environment covariates
    labels: flowering time maturity group and environmental PCs
    split: pangenome lineage geographic region and environment grouped
    metrics: [Spearman, R2, normalized_RMSE, worst_region_R2]
  - id: peanut_pangenome_sv_trait
    category: legume_specialist
    core: true
    availability: public_8_genome_269_accession_source_verified_not_built
    unit: Arachis SV or PAV with 32768-to-262144-bp context
    labels: core_accessory status seed length seed weight and validated candidate rank
    split: sealed cold Arachis accessions and SV-family grouping
    metrics: [auPRC, MRR, Spearman, R2]
  - id: glycine_wgd_homeolog_retrieval
    category: legume_specialist
    core: true
    availability: buildable_after_frozen_synteny_and_orthology
    unit: paired or retrieval gene loci with nested flanking contexts
    labels: syntenic homeolog ortholog or other paralog
    split: complete homeolog family and material grouping
    metrics: [MRR, recall_at_1, recall_at_5, pair_auROC]
  - id: soynam_leave_family_out_prediction
    category: breeding
    core: true
    availability: public_5600_RIL_genotype_source_verified_trait_receipts_pending
    unit: RIL genotype with LD-block sequence embeddings
    labels: one audited quantitative trait and environment per dataset receipt
    split: leave_family_out and held_environment
    metrics: [Pearson, Spearman, R2, normalized_RMSE]
